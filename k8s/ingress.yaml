apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-bbs
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bubblevoice.example.com
      secretName: voice-bbs-tls
  rules:
    - host: bubblevoice.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voice-bbs
                port:
                  number: 80
